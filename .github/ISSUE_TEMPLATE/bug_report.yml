name: Bug report
description: Report a problem with the integration
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue.
  - type: input
    id: home_assistant_version
    attributes:
      label: Home Assistant version
      placeholder: 2026.3.0
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: 0.2.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: configuration
    attributes:
      label: Feed configuration
      description: Share the configured frames, output path and formatting choices.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant log lines from Home Assistant.
      render: shell
